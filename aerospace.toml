# AeroSpace config
# Docs: https://nikitabobko.github.io/AeroSpace/guide

# ── Start at login ────────────────────────────────────────────────────────────
start-at-login = true

# Notify SketchyBar when workspace changes
exec-on-workspace-change = ['/bin/bash', '-c',
    '/opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# ── Gaps ──────────────────────────────────────────────────────────────────────
[gaps]
inner.horizontal = 8
inner.vertical   = 8
outer.left       = 8
outer.bottom     = 8
outer.top        = 8
outer.right      = 8

# ── General ───────────────────────────────────────────────────────────────────
[mode.main.binding]

# Focus windows (Vim-style)
alt-h = 'focus left'
alt-l = 'focus right'
alt-k = 'focus up'
alt-j = 'focus down'

# Move windows
alt-shift-h = 'move left'
alt-shift-l = 'move right'
alt-shift-k = 'move up'
alt-shift-j = 'move down'

# Resize (hold alt-r to enter resize mode)
alt-r = 'mode resize'

# Join windows into a container (preferred over 'split' with normalizations on)
alt-v = 'join-with right'
alt-s = 'join-with down'

# Layouts
alt-f        = 'layout floating tiling'   # toggle float
alt-shift-f  = 'fullscreen'
alt-comma    = 'layout tiles horizontal vertical'
alt-period   = 'layout accordion horizontal vertical'

# Close focused window
alt-shift-q = 'close'

# Reload config
alt-shift-r = 'reload-config'

# Workspaces 1–9
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Move window to workspace and follow
alt-shift-ctrl-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-ctrl-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-ctrl-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-ctrl-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-ctrl-5 = ['move-node-to-workspace 5', 'workspace 5']

# Cycle through workspaces
alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# ── Resize mode ───────────────────────────────────────────────────────────────
[mode.resize.binding]
h = 'resize width -50'
l = 'resize width +50'
k = 'resize height -50'
j = 'resize height +50'
# Larger steps
shift-h = 'resize width -200'
shift-l = 'resize width +200'
shift-k = 'resize height -200'
shift-j = 'resize height +200'
enter = 'mode main'
esc   = 'mode main'

# ── App workspace assignments ─────────────────────────────────────────────────
# Automatically send apps to specific workspaces
[[on-window-detected]]
if.app-id = 'com.apple.Terminal'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.googlecode.iterm2'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'notion.id'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 9'
